name: AgentGuard Self-Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install AgentGuard
        run: pip install -e .
      - name: Self-Scan
        run: python -c "from agentguard.scanner import scan_directory; import json; r=scan_directory('.'); print(json.dumps({'files':r.files_scanned,'findings':len(r.findings)}))"
