name: "AgentGuard Security Scan"
description: "Scan AI agent code for OWASP ASI Top 10 vulnerabilities"
branding:
  icon: "shield"
  color: "blue"
inputs:
  path:
    description: "Directory or file to scan"
    required: false
    default: "."
  format:
    description: "Output format: text, json, or sarif"
    required: false
    default: "sarif"
  min-severity:
    description: "Minimum severity to report: critical, high, medium, low, info"
    required: false
    default: "info"
  fail-on-finding:
    description: "Fail the workflow if findings are found (true/false)"
    required: false
    default: "true"
runs:
  using: "composite"
  steps:
    - name: Install AgentGuard
      run: pip install dfx-agentguard
      shell: bash
    - name: Run AgentGuard scan
      run: |
        ARGS="--format ${{ inputs.format }} --min-severity ${{ inputs.min-severity }}"
        if [ "${{ inputs.fail-on-finding }}" = "false" ]; then
          ARGS="$ARGS --no-exit-code"
        fi
        if [ "${{ inputs.format }}" = "sarif" ]; then
          agentguard ${{ inputs.path }} $ARGS > agentguard-results.sarif
          echo "::notice::AgentGuard scan complete. Uploading SARIF results."
        else
          agentguard ${{ inputs.path }} $ARGS
        fi
      shell: bash
    - name: Upload SARIF results
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: agentguard-results.sarif
        category: agentguard
